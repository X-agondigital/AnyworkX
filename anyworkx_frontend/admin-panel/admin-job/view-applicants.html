<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyWorkX Admin panel | All Jobs List</title>

    <link rel="icon" href="../../assets/images/favicon.png">

    <!-- Google Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Blinker:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!--Remix Icon CDN-->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="../../assets/scss/admin.css" rel="stylesheet">
</head>

<body>
    <nav class="admin-nav">
        <div class="logo--container">
            <img src="../../assets/images/anyworkx-logo-dark.png" alt="logo for anyworks" class="logo-image">
        </div>

        <div class="menu--toggle">
            <i class="ri-menu-3-line hamburger" id="hamburger"></i>
        </div>

        <div class="right--side__nav">
            <ul class="nav--items__container">
                <a href="../admin-message/admin-message.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-message-2-line"></i> <span>Messages</span></li>
                </a>
                <a href="../admin-subscription/subscribers.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-mail-check-line "></i> <span>Email Subscriptions</span></li>
                </a>
                <a href="create.html active" class="admin_nav-link active">
                    <li class="admin_nav-item"><i class="ri-briefcase-line"></i> <span>Manage jobs</span></li>
                </a>
                <a href="../manage-admin/admin.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-user-3-line"></i> <span>Manage Admins</span></li>
                </a>

            </ul>

            <div class="cta-button"><a href="../admin-login.html"><button
                        class="btn get--started__btn">Logout</button></a></div>
        </div>
    </nav>
    <div class="overlay hidden"></div>

    <div class="sidebar">
        <a href="all-job.html">
            <h4>Job</h4>
            <p>Edit and update jobs</p>
        </a>
        <a class="active" href="#">
            <h4>Applications</h4>
            <p>View available applications</p>
        </a>
    </div>

    <main class="main-content aside-sidebar">

        <header class="secondary--nav">
            <a href="job-list.html" class="prev-btn"><i class="ri-arrow-left-s-line prev-icon"></i> Back</a>
            <h2>Applications under <span id="job-title"></span></h2>
            <a href="create.html" class="btn">Create a job</a>
        </header>

        <section class="jobs--list">
            <table id="table-jobs-list">
                <thead id="thead-output">
                    <tr>
                        <th scope="col">Name of Applicants</th>
                        <th scope="col">Date Applied</th>
                        <th scope="col" colspan="2">Actions</th>
                    </tr>
                </thead>

                <tbody id="jobs_list-table-body">
                    <tr>
                        <td data-label="Namee of Applicants">Veronica Dekunle</td>
                        <td data-label="Date Applied">9:30 03/08/2023</td>
                        <td class="flex-container"><a href="view-application.html" class="edit btn--action">View</a> <a
                                class="secondary-action btn--action"><i class="ri-star-line"></i></a> <a
                                class="delete btn--action">Delete</a></td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/admin.js"></script>

    <script>

        function getJobPositions() {
            fetch('https://anyworkx.onrender.com/api/view/job/application/')
                .then((response) => response.json())
                .then((applicants) => {
                    let output = '';
                    let jobTitle = ``;
                    applicants.Applicant.forEach((applicant) => {
                        const applicantName = applicant.first_name + " " + applicant.last_name;
                        const dateApplied = applicant.created_at;
                        const applicantId = applicant.id;

                        output += `
                            <tr>
                                <td data-label="Job Title">${applicantName}</td>
                                <td data-label="Number of Applications">${dateApplied}</td>
                                <td class="flex-container"><a class="edit btn--action" data-id="${applicantId}">View</a> <a class="secondary-action btn--action"><i class="ri-star-line"></i></a> <a class="delete btn--action">Delete</a></td>     
                            </tr>
                        `;
                        jobTitle = `${applicant.job.job_title}`;

                    });

                    document.querySelector('#jobs_list-table-body').innerHTML = output;
                    document.querySelector("#job-title").innerHTML = jobTitle;

                    // Add event listener to view button
                    const viewApplicant = document.querySelectorAll('.edit');
                    viewApplicant.forEach((button) => {
                        button.addEventListener('click', (e) => {
                            const jobId = e.target.getAttribute('data-id');
                            window.location.href = `view-application.html?id=${jobId}`
                        })
                    })

                })
                .catch((error) => {
                    console.log(`Error loading job openings: ${error}`);
                });
        }

        getJobPositions();
    </script>
</body>

</html>
