<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button class="bookmarkBtn"></button>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>

        </tbody>
    </table>
    <script>
        const bookmarkApp = document.querySelector('.bookmarkBtn');

        function getApplicants() {
            fetch(`https://anyworkx.onrender.com/api/admin/view/job/application/`)
                .then((response) => response.json())
                .then((applicants) => {
                    let output = '';
                    applicants.Applicant.forEach(applicant => {
                        const applicantName = applicant.first_name + ' ' + applicant.last_name;
                        const dateApplied = applicant.created_at;
                        const applicantId = applicant.id;

                        output += `
                    <tr>
                        <td data-label="Job Title">${applicantName}</td>
                        <td data-label="Number of Applications">${dateApplied}</td>
                        <td class="flex-container">
                            <a class="secondary-action bookmark btn--action" data-id="${applicantId}">
                                <i class="ri-star-line"></i>
                            </a>
                        </td>
                    </tr>
                    `
                    });

                    document.querySelector('tbody').innerHTML = output;
                })
                .catch((error) => console.log(error));
        }

        getApplicants();

        // const bookmarkButtons = document.querySelectorAll('.bookmark');

                    //         const jobId = e.target.getAttribute('data-id');
                    //         bookmarkApplicant(jobId);
                    //     });
                    // });
    </script>
</body>

</html>
