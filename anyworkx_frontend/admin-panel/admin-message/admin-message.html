        aside.sidebar::-webkit-scrollbar {
            display: none;
        }

        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background-color: #00A7D7;
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
        }

        .sidebar.active {
            width: 60px;
            display: none;
        }

        .sidebar li {
            cursor: pointer;
            padding: 12px;
            border-bottom: 1px solid rgba(217, 217, 217, 0.28);
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: 0.3s ease-in;
            color: #fff;
            margin: 6px 0;

        }

        .sidebar li:hover {
            background-color: rgba(217, 217, 217, 0.28);
            transition: 0.3s ease-in;
        }

        .sidebar li.selected {
            background-color: rgba(217, 217, 217, 0.28);
        }

        .main-page {
            position: relative;
            min-height: 100vh;
            width: calc(100% - 250px);
            left: 250px;
            transition: all 0.3s ease-in;
        }

        .sidebar.active~.main-page {
            width: calc(100% - 10px);
            left: 10px;
        }

        .main-page .panel-nav {
            display: flex;
            justify-content: flex-start;
            height: 80px;
            position: fixed;
            width: calc(100% - 250px);
            left: 250px;
            z-index: 100;
            padding: 0 20px;
            transition: all 0.3s ease;
        }

        .sidebar.active~.main-page .panel-nav {
            left: 0px;
            width: calc(100% - 10px);
        }

        .main-page .panel-nav .hamburger-wrap {
            display: flex;
            align-items: center;
            transform: translateY(60px);
        }

        .hamburger-wrap .hamburger-icon {
            font-size: 24px;
            background-color: #00A7D7;
            border-radius: 8px;
            padding: 8px;
            color: #fff;
        }

        @media(max-width: 1250px) {
            .sidebar {
                width: 20px;
                display: none;
            }

            .sidebar.active {
                width: 220px;
                display: block;
            }

            .main-page {
                width: calc(100% - 10px);
                left: 10px;
            }

            .sidebar.active~.main-page {
                /* width: calc(100% - 220px); */
                /* overflow: hidden; */
                left: 220px;
            }

            .main-page .panel-nav {
                width: calc(100% - 10px);
                left: 10px;
            }

            .sidebar.active~.main-page .panel-nav {
                width: calc(100% - 220px);
                left: 220px;
            }
        }

        .chatbox {
            margin-top: 100px;
        }

        .user-list {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .message-container {
            margin-bottom: 10px;

        .admin-message {
            background-color: lightblue;

        .user-message {

        #messages {
            display: flex;
            flex-direction: column;
            width: 90%;
            padding: 1rem;
            margin: auto;
            margin-bottom: 50px;
        }

        .message-container {

            /* font-size: 14px; */
        }

        .admin-message {

            color: #fff;
        }

        .user-message {

            background: hsla(0, 0%, 85%, 1);
        }

        .id-display {

        .chat-btn {
            font-family: inherit;

            font-weight: 600;

    <script>
        const sidebar = document.querySelector(".sidebar");
        const sidebarBtn = document.querySelector(".hamburger-wrap");
        const hamburgerMenu = document.querySelector(".hamburger-icon")

        sidebarBtn.addEventListener('click', function () {
            console.log("button clicked");
            sidebar.classList.toggle("active");

            if (sidebar.classList.contains("active")) {
                hamburgerMenu.classList.remove("ri-menu-fold-line");
                hamburgerMenu.classList.add("ri-menu-unfold-line");
            } else {

                hamburgerMenu.classList.add("ri-menu-fold-line");
                hamburgerMenu.classList.remove("ri-menu-unfold-line");
            }
        })
        // sidebarBtn.onclick = function () {

        //     
        // }
        const usersList = 'https://anyworkx.onrender.com/api/list/users/';
        const messageUrl = 'https://anyworkx.onrender.com/api/messages/';
        const adminMessageUrl = 'https://anyworkx.onrender.com/api/admin/messages/';

        // get admin token from localStorage
        const adminToken = localStorage.getItem('adminToken');

        const userList = document.getElementById('user-list');

        fetch(usersList)
            .then(response => response.json())
            .then(data => {
                // Get the first user from the list
                const firstUser = data[0];

                // Fetch and display the messages for the first user
                getMessages(firstUser.id);

                // Loop through the remaining users and create list items
                data.forEach(user => {
                    const listItem = document.createElement('li');
                    const usernameElement = document.createElement('span');
                    const emailElement = document.createElement('span');


                    usernameElement.textContent = user.username;
                    emailElement.textContent = user.email;
                    emailElement.style.fontWeight = 600;

                    listItem.appendChild(usernameElement);
                    listItem.appendChild(emailElement);

                    listItem.addEventListener('click', () => {
                        // Clear selected state from other list items
                        const selectedItems = document.querySelectorAll('.user-list .selected');
                        selectedItems.forEach(item => item.classList.remove('selected'));

                        // Add selected state to the clicked item
                        listItem.classList.add('selected');

                        // Fetch and display the messages for the selected user
                        getMessages(user.id);
                    });

                    userList.appendChild(listItem);
                });
            })
            .catch(error => {
                console.error('Error fetching users:', error);
            });

        const socket = new WebSocket('ws://' + window.location.host + '/ws/messages/');

        socket.onopen = function (e) {
            console.log('WebSocket connection established.');
        };

        socket.onmessage = function (e) {
            const data = JSON.parse(e.data);
            console.log('Received message:', data.message);
            // Update UI with new message
            getMessages(data.userId);
        };

        socket.onclose = function (e) {
            console.log('WebSocket connection closed.');
        };
        // get selected user ID from dropdown
        // const userId = document.getElementById('user-dropdown').value;

        // div.innerHTML = `<strong>${message.sender}: </strong>${message.message}`;

        function getMessages(userId) {
            fetch(`${adminMessageUrl}${userId}/`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${adminToken}`
                }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Network response was not ok: ${response.status}`);
                    }

                    return response.json();
                })
                .then(data => {
                    // Display the messages for the selected user
                    const messagesDiv = document.getElementById('messages');
                    messagesDiv.innerHTML = '';
                    data.forEach(message => {
                        const sender = message.sender === 2 ? 'You' : message.sender;
                        const messageContainer = document.createElement('div');
                        messageContainer.classList.add('message-container');
                        if (message.sender === 2) {
                            messageContainer.classList.add('admin-message');
                        } else {
                            messageContainer.classList.add('user-message');
                        }
                        const messageText = document.createElement('span');
                        messageText.innerHTML = `<strong>${sender}: </strong>${message.message}<br>`;
                        messageContainer.appendChild(messageText);
                        messagesDiv.appendChild(messageContainer);
                    });

                    // Scroll to the bottom of the messages
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;

                    // set the user-id field value
                    const userIdField = document.getElementById('user-id');
                    userIdField.value = userId;

                    window.onload = setTimeout(() => {
                        window.scrollTo(0, document.body.scrollHeight);
                    }, 1000);
                    console.log(data);
                })
                .catch(error => {
                    console.error('Error getting messages:', error);
                });
        }


        function sendMessage(message, userId) {
            fetch(`https://anyworkx.onrender.com/api/messages/reply/${userId}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${adminToken}`
                },
                body: JSON.stringify({
                    message: message
                })
            })
                .then(response => {
                    if (response.ok) {
                        console.log('Reply sent');

                        // refresh the messages for the selected user
                        setInterval(() => getMessages(userId), 1000);
                        // getMessages(userId);
                    } else {
                        console.log('Reply failed to send');
                    }
                })
                .catch(error => {
                    console.error('Error sending message:', error);
                });
        }


        const replyForm = document.getElementById('reply-form');
        replyForm.addEventListener('submit', event => {
            event.preventDefault();
            const messageInput = document.getElementById('reply-message');
            const messageBody = messageInput.value.trim();
            const userId = document.getElementById('user-id').value;

            if (messageBody && userId) {
                sendMessage(messageBody, userId);
                messageInput.value = '';
            }
        });
    // setInterval((userId) => getMessages(`${userId}`), 1000);



    </script>
    <script>

            localStorage.removeItem('adminToken');
            // Redirect to the login page
            window.location.href = '../admin-login.html'; // Replace with your login page URL
        }

        document.getElementById('logout').addEventListener('click', logout)
    </script>
