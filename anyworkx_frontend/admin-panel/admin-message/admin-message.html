    <!-- Google Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Blinker:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!--Remix Icon CDN-->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="../../assets/scss/admin.css" rel="stylesheet">
    <!-- <link rel="stylesheet" href="../../assets/scss/chatApp.css" rel="stylesheet"> -->


    <style>
        .chatbox {
            margin-top: 100px;
        }

        .user-select {
            position: fixed;
            top: 12%;
        }

        select {
            /* A reset of styles, including removing the default dropdown arrow */
            appearance: none;
            /* Additional resets for further consistency */
            background-color: transparent;
            border: none;
            padding: 0 1em 0 0;
            margin: 0;
            width: 100%;
            font-family: inherit;
            font-size: inherit;
            cursor: pointer;
            line-height: inherit;
            outline: none;
        }

        .select {
            width: 100%;
            min-width: 15ch;
            max-width: 30ch;
            border: 1px solid rgba(0, 167, 215, 1);
            border-radius: 0.25em;
            padding: 0.25em 0.5em;
            font-size: 1.25rem;
            cursor: pointer;
            line-height: 1.1;
            background-color: #fff;
            display: grid;
            grid-template-areas: "select";
            align-items: center;
            position: relative;
            margin-top: 12px;
            /* background-image: linear-gradient(to top, #f9f9f9, #fff 33%); */
        }

        select,
        .select:after {
            grid-area: select;
        }

        .select::after {
            content: "";
            width: 0.8em;
            height: 0.5em;
            background-color: rgba(0, 167, 215, 1);
            clip-path: polygon(100% 0%, 0 0%, 50% 100%);
            justify-self: end;
        }

        select::-ms-expand {
            display: none;
        }

        select:focus+.focus-select {
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border: 2px solid rgba(0, 167, 215, 1);
            border-radius: inherit;
        }

        #messages {
            display: flex;
            flex-direction: column;
            width: 90%;
            padding: 1rem;
            margin: auto;
            margin-bottom: 50px;
        }

        .message-container {
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 24px;
            max-width: 70%;
            word-wrap: break-word;
            /* font-size: 14px; */
        }

        .admin-message {
            align-self: flex-end;
            background: hsla(193, 100%, 42%, 1);
            color: #fff;
        }

        .user-message {
            align-self: flex-start;
            background: hsla(0, 0%, 85%, 1);
        }

        .id-display {
            visibility: hidden;
        }

        .chat-btn {
            font-family: inherit;
            font-size: 18px;
            font-weight: 600;
            height: 45px;
            border: 0px;
            border-radius: 6px;
            cursor: pointer;
            color: #fff;
            background-color: rgba(0, 167, 215, 1);
            padding: 16px;
        }

        .message-field {
            display: flex;
            align-items: center;
            background: hsla(193, 100%, 94%, 1);
            border-radius: .5rem;
            padding: .5rem 1.25rem;
            position: fixed;
            bottom: 8px;
            width: 90%;
            margin: 0 auto;
        }

        #reply-message {
            margin-right: 12px;
        }

        @media (max-width: 550px) {
            .chatbox {
                padding: 12px;
            }

            .chatbox-message-bottom,
            #messages {
                width: 100%;
            }
        }
    </style>
</head>

<body>

        </div>

        <div class="right--side__nav">
            <ul class="nav--items__container">
                <a href="admin-message.html" class="admin_nav-link active">
                    <li class="admin_nav-item"><i class="ri-message-2-line"></i> <span>Messages</span></li>
                </a>
                <a href="../admin-subscription/subscribers.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-mail-check-line "></i> <span>Email Subscriptions</span></li>
                </a>
                <a href="../admin-job/create.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-briefcase-line"></i> <span>Manage jobs</span></li>
                </a>
                <!-- <a href="../manage-admin/admin.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-user-3-line"></i> <span>Manage Admins</span></li>
                </a> -->

            </ul>

            <div class="cta-button"><a href="#"><button class="btn get--started__btn">Logout</button></a></div>
        </div>
    </nav>
    <div class="overlay hidden"></div>

    <!-- <div class="sidebar">
        <a href="all-job.html">
            <h4>Job</h4>
            <p>Edit and update jobs</p>
        </a>
        <a class="active" href="#">
            <h4>Applications</h4>

        </a>
    </div> -->

    <main class="main-content">
        <section class="chatbox">
            <div class="user-select">
                <label for="">Select a user to reply to</label>
                <div class="select">
                    <select id="user-dropdown" onchange="getMessages(this.value)">
                        <option value="">Select a user</option>
                        <!-- options for each user will be added dynamically here -->
                    </select>
                    <span class="focus-select"></span>
                </div>
            </div>
            <div id="messages"></div>
            <div class="chatbox-message-bottom">
                <form id="reply-form" class="chatbox-message-form">
                    <div class="id-display">
                        <label for="user-id">Selected User ID:</label>
                        <input type="text" id="user-id" disabled>
                    </div>
                    <br>
                    <div class="message-field">
                        <input type="text" id="reply-message" class="input-field" autofocus>
                        <br>
                        <button type="submit" class="chat-btn"><i class="ri-send-plane-2-line"></i></button>
                    </div>
                </form>
            </div>
        </section>


    </main>

    <script src="../../assets/js/main.js"></script>
</body>

</html>


<script>
    const usersList = 'https://anyworkx.onrender.com/api/list/users/';
    const messageUrl = 'https://anyworkx.onrender.com/api/messages/';
    const adminMessageUrl = 'https://anyworkx.onrender.com/api/admin/messages/';

    // get admin token from localStorage
    const adminToken = localStorage.getItem('adminToken');

    fetch(usersList)
        .then(response => response.json())
        .then(data => {
            // Populate the dropdown list with users
            const usersSelect = document.getElementById('user-dropdown');
            usersSelect.innerHTML = '';
            data.forEach(user => {
                const option = document.createElement('option');
                option.value = user.id;
                option.innerHTML = user.username;
                usersSelect.appendChild(option);
            });
        })
        .catch(error => {
            console.error('Error fetching users:', error);
        });

    // get selected user ID from dropdown
    const userId = document.getElementById('user-dropdown').value;

    // div.innerHTML = `<strong>${message.sender}: </strong>${message.message}`;



    function getMessages(userId) {
        fetch(`${adminMessageUrl}${userId}/`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${adminToken}`
            }
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Network response was not ok: ${response.status}`);
                }

                return response.json();
            })
            .then(data => {
                // Display the messages for the selected user
                const messagesDiv = document.getElementById('messages');
                messagesDiv.innerHTML = '';
                data.forEach(message => {
                    const sender = message.sender === 2 ? 'You' : message.sender;
                    const messageContainer = document.createElement('div');
                    messageContainer.classList.add('message-container');
                    if (message.sender === 2) {
                        messageContainer.classList.add('admin-message');
                    } else {
                        messageContainer.classList.add('user-message');
                    }
                    const messageText = document.createElement('span');
                    messageText.innerHTML = `<strong>${sender}: </strong>${message.message}<br>`;
                    messageContainer.appendChild(messageText);
                    messagesDiv.appendChild(messageContainer);
                });

                // Scroll to the bottom of the messages
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                // set the user-id field value
                const userIdField = document.getElementById('user-id');
                userIdField.value = userId;

                window.onload = setTimeout(() => {
                    window.scrollTo(0, document.body.scrollHeight);
                }, 1000);
                console.log(data);
            })
            .catch(error => {
                console.error('Error getting messages:', error);
            });
    }


    const replyForm = document.getElementById('reply-form');
    replyForm.addEventListener('submit', event => {
        event.preventDefault();
        // const replyMessage = document.getElementById('messages').value;
        const messageInput = document.getElementById('reply-message');
        const messageBody = messageInput.value.trim();
        const userId = document.getElementById('user-id').value;

        if (messageBody && userId) {
            sendMessage(messageBody, userId);
            messageInput.value = '';
        }
        // sendMessageReply(replyMessage, userId);
    });

    function sendMessage(message, userId) {
        fetch(`https://anyworkx.onrender.com/api/messages/reply/${userId}/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${adminToken}`
            },
            body: JSON.stringify({
                message: message
            })
        })
            .then(response => {
                if (response.ok) {
                    console.log('Reply sent');
                    // clear the input field
                    messageInput.value = '';
                    // refresh the messages for the selected user
                    getMessages(userId);
                } else {
                    console.log('Reply failed to send');
                }
            })
            .catch(error => {
                console.error('Error sending message:', error);
            });
    }


</script>
</body>
