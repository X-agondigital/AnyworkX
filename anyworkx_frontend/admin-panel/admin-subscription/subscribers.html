<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="icon" href="../../assets/images/favicon.png">

    <!-- Google Font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Blinker:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!--Remix Icon CDN-->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="../../assets/scss/admin.css" rel="stylesheet">
</head>

<body>
    <nav class="admin-nav">
        <div class="logo--container">
            <img src="../../assets/images/anyworkx-logo-dark.png" alt="logo for anyworks" class="logo-image">
        </div>

        <div class="menu--toggle">
            <i class="ri-menu-3-line hamburger" id="hamburger"></i>
        </div>

        <div class="right--side__nav">
            <ul class="nav--items__container">
                <a href="../admin-message/admin-message.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-message-2-line"></i> <span>Messages</span></li>
                </a>
                <a href="subscribers.html" class="admin_nav-link active">
                    <li class="admin_nav-item"><i class="ri-mail-check-line "></i> <span>Email Subscriptions</span></li>
                </a>
                <a href="../admin-job/create.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-briefcase-line"></i> <span>Manage jobs</span></li>
                </a>
                <!-- <a href="../manage-admin/admin.html" class="admin_nav-link">
                    <li class="admin_nav-item"><i class="ri-user-3-line"></i> <span>Manage Admins</span></li>
                </a> -->

            </ul>

            <div class="cta-button"><a href="#"><button class="btn get--started__btn">Logout</button></a></div>
        </div>
    </nav>
    <div class="overlay hidden"></div>

    <main class="main-content">
        <section class="subscribers-page">
            <h1>Subscribers to Newsletter Updates</h1>
            <header class="newsletter-upper--section">
                <div class="data-filter">
                    <button class="no--bg active">All</button>
                    <button class="no--bg">Today</button>
                </div>
                <div class="download-options">
                    <button class="btn">Download as CSV</button>
                    <button class="btn--without-bg">Download as XLS</button>
                </div>
            </header>

            <article class="newsletter-lower--section">
                <table id="table-subscribers">
                    <thead id="thead-output">
                        <tr>
                            <th scope="col">Email Address</th>
                            <th scope="col">Date subscribed</th>
                            <th scope="col" colspan="2">Action</th>
                        </tr>
                    </thead>

                    <tbody id="subscriber-table-body">

                    </tbody>
                </table>

                <div class="pagination">
                    <p id="pagination-output">Page <button class="pagination-button">1</button></p>
                </div>
            </article>
        </section>
    </main>
    <script src="../../assets/js/admin.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        let currentPage = 1; // Track the current page globally

        function getSubscribers(page) {
            fetch(`https://anyworkx.onrender.com/api/subscribers/?page=${page}`)
                .then((response) => response.json())
                .then((subscribers) => {
                    let output = '';
                    for (const subscriber of subscribers.subscribers) {
                        output += `
                    <tr>
                        <td data-label="Email Address">${subscriber.email}</td>
                        <td data-label="Date subscribed">${subscriber.created_at}</td>
                        <td><a class="delete btn--action">Delete</a></td>
                    </tr>
                `;
                    }
                    document.getElementById("subscriber-table-body").innerHTML = output;
                    currentPage = page; // Update the current page value
                    generatePaginationButtons(subscribers.last_page);
                })
                .catch((error) => {
                    console.log(`Error loading subscribers: ${error}`);
                });
        }

        function generatePaginationButtons(totalPages) {
            const paginationDiv = document.querySelector(".pagination");
            let paginationOutput = "Page ";
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    paginationOutput += `<button class="current-page">${i}</button> `;
                } else {
                    paginationOutput += `<button class="pagination-button">${i}</button> `;
                }
            }
            paginationDiv.innerHTML = paginationOutput;
            const buttons = paginationDiv.querySelectorAll(".pagination-button");
            buttons.forEach((button) => {
                button.addEventListener("click", () => {
                    getSubscribers(button.textContent);
                    buttons.forEach((button) => button.classList.remove("current-page"));
                    button.classList.add("current-page");
                });
            });
        }

        // Initialize with the first page
        getSubscribers(currentPage);
    </script>
</body>

</html>
