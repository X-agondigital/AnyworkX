<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Customer Service Chat App</title>
    <style>
      /* Add your CSS styling here */
      .send-button{
        position: relative;
        padding: 8px 16px;
        background: #009579;
        
      }

      .send-button:active{
        background: #007a63;
      }
      .button__text{
        font: bold 20px 'poppins', sans-serif;
        color: #fff;
        transition: all 0.2s;
      }
      .button--loading::after{
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        inset: 0;
        margin: auto;
        border: 4px solid transparent;
        border-top-color: #fff;
        border-radius: 50%;
        animation: button-loading-spinner 1s ease infinite;
      }
      @keyframes button-loading-spinner {
        from{
            transform: rotate(0turn);
        }
        to{
            transform: rotate(1turn);
        }
      }
    </style>
  </head>
  <body>
    <!-- <td><a class="delete btn--action" data-id="${job.id}">Delete</a></td> -->

    <button class="send-button">
        <span class="button__text">Proceed</span>
    </button>
    
    <script>
        const sendButton = document.querySelector('.send-button')

        sendButton.addEventListener('click', ()=>{
            sendButton.classList.add("button--loading")
            document.querySelector('.button__text').style.visibility="hidden";
        })
    </script>
  </body>
</html>
