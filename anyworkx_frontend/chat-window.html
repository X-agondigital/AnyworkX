<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/scss/main.css" rel="stylesheet">

    <style>

        .chatbox-message-wrapper {
            height: 80%;
            max-width: 420px;
            border-radius: .5rem;
            overflow: hidden;
            transition: .2s;
            margin: 24px auto;
            box-shadow: 0px 12px 40px rgba(174, 174, 174, 0.15);
        }


        .chatbox-message-content {
            background: #fff;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            grid-row-gap: 1rem;
            max-height: 60%;
            overflow-y: auto;
            
        }

        .chatbox-message-item {
            width: 90%;
            padding: 1rem;
        }

        .chatbox-message-item.sent {
            align-self: flex-end;
            background: hsla(193, 100%, 42%, 1);
            color: #fff;
            border-radius: .75rem 0 .75rem .75rem;
        }

        .chatbox-message-item.received {
            background: hsla(0, 0%, 85%, 1);
            border-radius: 0 .75rem .75rem .75rem;
            box-shadow: .25rem .25rem 1.5rem rgba(0, 0, 0, .05);
        }

        .chatbox-message-item-time {
            float: right;
            font-size: .75rem;
            margin-top: .5rem;
            /* display: inline-block; */
        }

        .chatbox-message-bottom {
            background: var(--white);
            /* padding: .75rem 1.5rem; */
            position: absolute;
            bottom: 0;
            max-width: 420px;
        }

        .chatbox-message-form {
            display: flex;
            align-items: center;
            background: hsla(193, 100%, 94%, 1);
            border-radius: .5rem;
            padding: .5rem 1.25rem;
        }

        .chatbox-message-input {
            background: #fff;
            outline: none;
            border: none;
            resize: none;
            scrollbar-width: none;
            height: 40px;
        }

        .chatbox-message-input::-webkit-scrollbar {
            display: none;
        }

        .chatbox-message-submit {
            font-size: 24px;
            color: rgba(0, 167, 215, 1);
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            margin-left: 12px;
        }

        .chatbox-message-no-message {
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
        }

        /* CHATBOX */
    </style>

    <!--OWL CAROUSEL CSS CDN-->
    <link rel="stylesheet" type="text/css"
        href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.2.1/assets/owl.carousel.min.css">
    <link rel="stylesheet" type="text/css"
        href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.2.1/assets/owl.theme.default.min.css">
</head>

<body>
    <div class="chatbox-wrapper">
        <div class="chatbox-message-wrapper">

            <div class="chatbox-message-content">
                <h4 class="chatbox-message-no-message">You don't have message yet!</h4>
                <!-- <div class="chatbox-message-item sent">
					<span class="chatbox-message-item-text">
						Lorem, ipsum, dolor sit amet consectetur adipisicing elit. Quod, fugiat?
					</span>
					<span class="chatbox-message-item-time">08:30</span>
				</div>
				<div class="chatbox-message-item received">
					<span class="chatbox-message-item-text">
						Lorem, ipsum, dolor sit amet consectetur adipisicing elit. Quod, fugiat?
					</span>
					<span class="chatbox-message-item-time">08:30</span>
				</div> -->
            </div>
            <div class="chatbox-message-bottom">
                <form action="#" class="chatbox-message-form">
                    <textarea rows="1" placeholder="Type message..." class="chatbox-message-input"></textarea>
                    <button type="submit" class="chatbox-message-submit"><i class="ri-send-plane-2-line"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>

    <script>
        const textarea = document.querySelector('.chatbox-message-input')
        const chatboxForm = document.querySelector('.chatbox-message-form')

        textarea.addEventListener('input', function () {
            let line = textarea.value.split('\n').length

            if (textarea.rows < 6 || line < 6) {
                textarea.rows = line
            }

            if (textarea.rows > 1) {
                chatboxForm.style.alignItems = 'flex-end'
            } else {
                chatboxForm.style.alignItems = 'center'
            }
        })


        // CHATBOX MESSAGE
        const chatboxMessageWrapper = document.querySelector('.chatbox-message-content')
        const chatboxNoMessage = document.querySelector('.chatbox-message-no-message')

        chatboxForm.addEventListener('submit', function (e) {
            e.preventDefault()

            if (isValid(textarea.value)) {
                writeMessage()
                setTimeout(autoReply, 1000)
            }
        })



        function addZero(num) {
            return num < 10 ? '0' + num : num
        }

        function writeMessage() {
            const today = new Date()
            let message = `
		<div class="chatbox-message-item sent">
			<span class="chatbox-message-item-text">
				${textarea.value.trim().replace(/\n/g, '<br>\n')}
			</span>
			<span class="chatbox-message-item-time">${addZero(today.getHours())}:${addZero(today.getMinutes())}</span>
		</div>
	`
            chatboxMessageWrapper.insertAdjacentHTML('beforeend', message)
            chatboxForm.style.alignItems = 'center'
            textarea.rows = 1
            textarea.focus()
            textarea.value = ''
            chatboxNoMessage.style.display = 'none'
            scrollBottom()
        }

        function autoReply() {
            const today = new Date()
            let message = `
		<div class="chatbox-message-item received">
			<span class="chatbox-message-item-text">
				Thank you for your awesome support!
			</span>
			<span class="chatbox-message-item-time">${addZero(today.getHours())}:${addZero(today.getMinutes())}</span>
		</div>
	`
            chatboxMessageWrapper.insertAdjacentHTML('beforeend', message)
            scrollBottom()
        }

        function scrollBottom() {
            chatboxMessageWrapper.scrollTo(0, chatboxMessageWrapper.scrollHeight)
        }

        function isValid(value) {
            let text = value.replace(/\n/g, '')
            text = text.replace(/\s/g, '')

            return text.length > 0
        }

        const messageBottom = document.querySelector('.chatbox-message-bottom');
        const messageContent = document.querySelector('.chatbox-message-content');

        messageBottom.style.width = messageContent.offsetWidth + "px";
    </script>
</body>

</html>
